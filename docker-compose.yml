# Local development stack. For production use docker-compose.prod.yml.
services:
  db:
    image: postgres:16-alpine
    container_name: ledgerhouse_db
    environment:
      POSTGRES_DB: ledgerhouse_db
      POSTGRES_USER: ledgerhouse_user
      POSTGRES_PASSWORD: ledgerhouse_secure_pass_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerhouse_user -d ledgerhouse_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ledgerhouse_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-stage-0-dummy-key-for-local-dev-only-do-not-use-in-prod
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - DATABASE_URL=postgres://ledgerhouse_user:ledgerhouse_secure_pass_123@db:5432/ledgerhouse_db
      - POSTGRES_DB=ledgerhouse_db
      - POSTGRES_USER=ledgerhouse_user
      - POSTGRES_PASSWORD=ledgerhouse_secure_pass_123
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - HMRC_ENVIRONMENT=${HMRC_ENVIRONMENT:-sandbox}
      - HMRC_CLIENT_ID=${HMRC_CLIENT_ID:-}
      - HMRC_CLIENT_SECRET=${HMRC_CLIENT_SECRET:-}
      - HMRC_REDIRECT_URI=${HMRC_REDIRECT_URI:-http://localhost:8000/api/integrations/hmrc/callback}
      - HMRC_SCOPES=${HMRC_SCOPES:-read:vat write:vat}
      - HMRC_API_BASE_URL=${HMRC_API_BASE_URL:-https://test-api.service.hmrc.gov.uk}
      - COMPANIES_HOUSE_API_KEY=${COMPANIES_HOUSE_API_KEY:-}
      - COMPANIES_HOUSE_API_BASE_URL=${COMPANIES_HOUSE_API_BASE_URL:-https://api.company-information.service.gov.uk}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
