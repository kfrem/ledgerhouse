# Production stack.
#
#   1. Copy .env.example to .env and fill in real values (SECRET_KEY, DB
#      password, ALLOWED_HOSTS). Never commit .env.
#   2. docker compose -f docker-compose.prod.yml up -d --build
#   3. First deploy only:
#        docker compose -f docker-compose.prod.yml run --rm web python manage.py migrate
#        docker exec -i ledgerhouse_db psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" < deploy/create_app_role.sql
#      then set APP_DB_USER/APP_DB_PASSWORD in .env and restart so the web app
#      connects as the restricted role (see DEPLOYMENT.md).
#
# Migrations must run as the schema owner (admin credentials); the web app
# should run as the restricted ledgerhouse_app role so PostgreSQL RLS applies
# by default rather than depending solely on SET ROLE in the middleware.
services:
  db:
    image: postgres:16-alpine
    container_name: ledgerhouse_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port published: only the web service needs to reach the DB.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    container_name: ledgerhouse_web
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py check --database default --deploy --fail-level ERROR &&
             gunicorn ledgerhouse.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:?set in .env}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:?set in .env}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      - SECURE_TLS=${SECURE_TLS:-False}
      - POSTGRES_DB=${POSTGRES_DB}
      # The web app connects as the restricted app role once it has been
      # created; falls back to the admin role for the very first boot.
      - POSTGRES_USER=${APP_DB_USER:-${POSTGRES_USER}}
      - POSTGRES_PASSWORD=${APP_DB_PASSWORD:-${POSTGRES_PASSWORD}}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
